<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>{{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />

<style>
  :root {
    /* Studio UI tokens — PPT layer */
    --sb-color-primary-s500: {{PRIMARY_S500}};
    --sb-color-primary-s600: {{PRIMARY_S600}};
    --fg: #1A1A1A;
    --fg-muted: #8A8580;
    --fg-subtle: #BFBAB3;
    --bg-canvas: #FAF9F7;
    --bg-panel: #F2EFEA;
    --rule: #E5E1DA;

    /* Type scale — projection sizing */
    --type-display: 96px;
    --type-h1: 72px;
    --type-h2: 44px;
    --type-body: 32px;
    --type-caption: 24px;
    --type-eyebrow: 22px;
    --type-mega: 220px;

    /* Spacing */
    --pad-x: 120px;
    --pad-top: 100px;
    --pad-bottom: 100px;
    --gap-title: 56px;
    --gap-bullet: 28px;
    --gap-col: 80px;

    --radius: 8px;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: 'Apple SD Gothic Neo', 'Pretendard', 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
  }

  deck-stage { background: #000; }

  /* Slide base */
  section {
    background: var(--bg-canvas);
    color: var(--fg);
    padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    font-family: 'Apple SD Gothic Neo', 'Pretendard', 'Inter', sans-serif;
    letter-spacing: -0.01em;
  }

  /* Type roles */
  .display { font-size: var(--type-display); font-weight: 800; line-height: 1.05; letter-spacing: -0.035em; }
  .h1 { font-size: var(--type-h1); font-weight: 700; line-height: 1.1; letter-spacing: -0.025em; }
  .h2 { font-size: var(--type-h2); font-weight: 600; line-height: 1.2; letter-spacing: -0.02em; }
  .body { font-size: var(--type-body); font-weight: 500; line-height: 1.45; }
  .caption { font-size: var(--type-caption); font-weight: 400; color: var(--fg-muted); letter-spacing: 0; }
  .eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: var(--type-eyebrow);
    font-weight: 500;
    color: var(--fg-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .mega { font-size: var(--type-mega); font-weight: 600; line-height: 0.95; letter-spacing: -0.05em; }

  .primary { color: var(--sb-color-primary-s500); }
  .muted { color: var(--fg-muted); }

  /* Header strip */
  .slide-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 24px;
    margin-bottom: var(--gap-title);
  }
  .slide-head .lhs { display: flex; gap: 32px; align-items: baseline; }
  .slide-head .topic { font-family: 'JetBrains Mono', monospace; font-size: 24px; color: var(--fg-muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .slide-head .num { font-family: 'JetBrains Mono', monospace; font-size: 24px; color: var(--fg-subtle); letter-spacing: 0.08em; }

  /* Bullets — no dots, position-based emphasis */
  ul.bullets {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: var(--gap-bullet);
  }
  ul.bullets > li {
    font-size: var(--type-body);
    font-weight: 500;
    line-height: 1.4;
    display: grid;
    grid-template-columns: 16px 1fr;
    column-gap: 20px;
    align-items: center;          /* dash centers with bullet content row */
    max-width: 1400px;
  }
  ul.bullets > li::before {
    content: "";
    height: 1px;
    background: var(--fg);
    align-self: center;
  }
  ul.bullets > li > .li-content { min-width: 0; }
  ul.bullets > li.muted-item { color: var(--fg-muted); }
  ul.bullets > li.muted-item::before { background: var(--fg-muted); }
  ul.bullets > li.key-item { color: var(--fg); font-weight: 700; }
  ul.bullets > li.key-item::before { background: var(--fg); }

  /* Two-column layout */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap-col);
    align-content: start;
  }

  /* Split layout */
  .split {
    display: flex;
    align-items: center;
    gap: var(--gap-col);
  }
  .split > .text-block { flex: 1.05; min-width: 0; }
  .split > .media-block { flex: 0.95; min-width: 0; }
  .media-block.photo {
    aspect-ratio: 4 / 3;
    background-size: cover;
    background-position: center;
    background-color: var(--bg-soft);
    filter: grayscale(0.15) contrast(1.02);
  }
  .col-block .col-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    color: var(--fg-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }

  /* Image / chart placeholder */
  .placeholder {
    background-image: repeating-linear-gradient(
      135deg,
      #ECE7DF 0px,
      #ECE7DF 2px,
      #F2EFEA 2px,
      #F2EFEA 14px
    );
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: var(--fg-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.05em;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  .placeholder .ph-tag { text-transform: uppercase; font-size: 24px; color: var(--fg-subtle); letter-spacing: 0.1em; }
  .placeholder { font-size: 24px; }

  /* Cover */
  .cover {
    padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
    justify-content: space-between;
  }
  .cover .top { display: flex; justify-content: space-between; align-items: baseline; }
  .cover .center { display: flex; flex-direction: column; gap: 36px; }
  .cover .meta { display: flex; gap: 64px; color: var(--fg-muted); font-family: 'JetBrains Mono', monospace; font-size: 22px; letter-spacing: 0.05em; }

  /* Section divider */
  .section-divider {
    background: #111;
    color: #F5F0EB;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 28px;
  }
  .section-divider .h1 { color: #F5F0EB; margin: 0; }
  .section-divider .sec-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    color: rgba(245, 240, 235, 0.35);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .section-divider.primary { background: var(--sb-color-primary-s500); }

  /* Stat row */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 64px;
    border-top: 1px solid var(--rule);
    padding-top: 48px;
  }
  .stat-row .stat .num {
    font-size: 88px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .stat-row .stat .lbl {
    margin-top: 16px;
    font-size: 24px;
    color: var(--fg-muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Footer */
  .slide-foot {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-top: 32px;
    border-top: 1px solid var(--rule);
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    color: var(--fg-subtle);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Cover dark (inverted) */
  .cover-dark {
    background: #1C1917;
    color: #F5F0EB;
    align-items: center;
    text-align: center;
  }
  .cover-dark .muted { color: rgba(245, 240, 235, 0.5); }
  .cover-dark .eyebrow { color: rgba(245, 240, 235, 0.35); }

  /* ─ v2 Two-axis alignment ───────────────────────────────────── */

  section[data-align="center"] .text-block,
  section[data-align="center"] > h1,
  section[data-align="center"] > h2,
  section[data-align="center"] > ul,
  section[data-align="center"] > p,
  section[data-align="center"] .stack-block,
  section[data-align="center"] .image-caption {
    text-align: center;
  }
  section[data-align="right"] .text-block,
  section[data-align="right"] > h1,
  section[data-align="right"] > h2,
  section[data-align="right"] > ul,
  section[data-align="right"] > p,
  section[data-align="right"] .stack-block,
  section[data-align="right"] .image-caption {
    text-align: right;
  }
  /* When centered/right-aligned, hide bullet markers and collapse the
     marker column so the text doesn't look offset. */
  section[data-align="center"] ul.bullets > li,
  section[data-align="right"]  ul.bullets > li {
    grid-template-columns: 1fr;
    max-width: none;
  }
  section[data-align="center"] ul.bullets > li::before,
  section[data-align="right"]  ul.bullets > li::before { display: none; }
  section[data-align="center"] ul.bullets { align-items: center; }
  section[data-align="right"]  ul.bullets { align-items: flex-end; }

  /* Vertical alignment of slide content (column-flex sections) */
  section[data-valign="top"]    { justify-content: flex-start; }
  section[data-valign="center"] { justify-content: center; }
  section[data-valign="bottom"] { justify-content: flex-end; }

  /* Vertical alignment within split row */
  .split[data-valign="top"]    { align-items: flex-start; }
  .split[data-valign="center"] { align-items: center; }
  .split[data-valign="bottom"] { align-items: flex-end; }

  /* ─ v2 :::stack — vertical block container ───────────────── */
  .stack {
    display: flex;
    flex-direction: column;
    gap: 32px;
    width: 100%;
  }
  .stack[data-gap="small"]  { gap: 16px; }
  .stack[data-gap="medium"] { gap: 32px; }
  .stack[data-gap="large"]  { gap: 64px; }
  .stack-block { width: 100%; }

  /* ─ v2 :::table — markdown tables, slide-friendly ─────────── */
  table.md-table {
    width: 100%;
    max-width: 1400px;
    border-collapse: collapse;
    margin: 8px 0 16px;
    font-size: 26px;
    line-height: 1.3;
  }
  table.md-table th,
  table.md-table td {
    padding: 14px 18px;
    border-bottom: 1px solid var(--rule);
    text-align: left;
  }
  table.md-table th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--fg-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-bottom: 2px solid var(--fg);
    background: var(--bg-panel);
  }
  table.md-table tbody tr:nth-child(even) td { background: rgba(0, 0, 0, 0.02); }
  table.md-table .primary { color: var(--sb-color-primary-s500); font-weight: 700; }

  /* ─ v2 :::chart / :::plot — SVG charts ────────────────────── */
  .chart-stage,
  .plot-stage {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .chart-stage svg,
  .plot-stage svg {
    width: 100%;
    height: auto;
    max-height: 70vh;
  }

  /* ─ v2 :::image — large image with optional caption(s) ────── */
  .image-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    width: 100%;
  }
  .image-stage .image-main {
    width: 100%;
    display: flex;
    justify-content: center;
  }
  .image-stage .image-main img {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
    border-radius: var(--radius);
  }
  .image-stage .image-caption {
    max-width: 1400px;
  }

  /* "Provided by Studio Baeks" watermark on the structurally-last slide
     (typically :::thanks). Bottom-center, mono, subtle. Sits above slide
     content but below the deck-stage overlay (which is z-index 2147483000). */
  deck-stage > section:last-of-type::after {
    content: 'POWERED BY STUDIO BAEKS PPT ENGINE';
    position: absolute;
    bottom: 116px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.32);
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
    z-index: 5;
  }
  /* Light-canvas variant — if the last slide isn't a dark cover, use a
     muted dark text instead of the white fallback above. */
  deck-stage > section:last-of-type:not(.cover-dark):not([data-deck-darkbg])::after {
    color: rgba(26, 26, 26, 0.3);
  }

</style>
</head>
<body>

<deck-stage width="1920" height="1080">

{{SLIDES}}

</deck-stage>

{{SPEAKER_NOTES}}

{{DECK_STAGE_SCRIPT_TAG}}

</body>
</html>
